name: Build 4SPowerTools
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Get Legacy SDKs
        run: |
          rm -rf ~/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

      - name: Build Tweak
        run: |
          export THEOS=~/theos
          # The search party: looks everywhere for the 6.1 folder
          SDKPATH=$(find ~/theos/sdks -name "iPhoneOS6.1.sdk" -type d | head -n 1)
          echo "Robot found the SDK at: $SDKPATH"
          make package FINALPACKAGE=1 SYSROOT="$SDKPATH"
