name: Build 4SPowerTools
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          brew install ldid
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Get Legacy SDKs
        run: |
          rm -rf ~/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

      - name: Build Tweak
        run: |
          export THEOS=~/theos
          SDKPATH=$(find ~/theos/sdks -name "iPhoneOS*.sdk" -type d | head -n 1)
          make package FINALPACKAGE=1 SYSROOT="$SDKPATH"

      - name: Upload Tweak File
        uses: actions/upload-artifact@v4
        with:
          name: 4SPowerTools-DEB
          path: packages/*.deb
