name: Build 4SPowerTools
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Get Legacy SDKs
        run: |
          # This line deletes the "stuck" folder so it can't fail
          rm -rf ~/theos/sdks
          git clone https://github.com/theos/sdks.git ~/theos/sdks

      - name: Build Tweak
        run: |
          export THEOS=~/theos
          # This tells the Robot: "Use the iOS 6.1 dictionary"
          make package SDKVERSION=6.1
