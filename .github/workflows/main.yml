name: Build 4SPowerTools
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Get Legacy SDKs
        run: |
          rm -rf ~/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

      - name: Build Tweak
        run: |
          export THEOS=~/theos
          # This looks for 6.1, 6.0, or ANY iPhoneOS sdk folder
          SDKPATH=$(find ~/theos/sdks -name "iPhoneOS6.1.sdk" -o -name "iPhoneOS6.0.sdk" -o -name "iPhoneOS*.sdk" | head -n 1)
          
          if [ -z "$SDKPATH" ]; then
            echo "ERROR: No SDK found! Listing folder contents for owner:"
            ls -R ~/theos/sdks
            exit 1
          fi

          echo "Robot found the SDK at: $SDKPATH"
          make package FINALPACKAGE=1 SYSROOT="$SDKPATH"
